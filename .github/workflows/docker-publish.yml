name: SignalingServer Docker

on:
  push:
    paths:
      - 'SignalingServer/**'
      - '.github/workflows/docker-publish.yml'
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'SignalingServer/**'

env:
  IMAGE_NAME: quickdesk-signaling
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/quickdesk-signaling
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: >-
          github.event_name == 'push'
          && startsWith(github.ref, 'refs/tags/v')
          && vars.DOCKERHUB_ENABLED == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # Strip leading 'v' for Docker tag
          echo "docker_version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.docker_version }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=,enable=${{ !startsWith(github.ref, 'refs/tags/v') }}

      # ---- Tag push: build, push to GHCR (+ optional Docker Hub), save artifact ----
      - name: Build and push to GHCR (tag)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: ./SignalingServer
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push to Docker Hub (tag, optional)
        if: >-
          github.event_name == 'push'
          && startsWith(github.ref, 'refs/tags/v')
          && vars.DOCKERHUB_ENABLED == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./SignalingServer
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/quickdesk-signaling:${{ steps.version.outputs.docker_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/quickdesk-signaling:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Save image tar (tag)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          docker pull ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.docker_version }}
          docker save ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.docker_version }} | gzip > quickdesk-signaling-image.tar.gz

      - name: Upload artifact (tag)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: quickdesk-signaling-image
          path: quickdesk-signaling-image.tar.gz
          retention-days: 90

      - name: Upload to release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: quickdesk-signaling-image.tar.gz
          asset_name: quickdesk-signaling-${{ steps.version.outputs.tag }}-image.tar.gz
          tag: ${{ github.ref }}
          overwrite: true

      # ---- Non-tag push / PR: build image, save as artifact only ----
      - name: Build image (non-tag)
        if: "!(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))"
        uses: docker/build-push-action@v6
        with:
          context: ./SignalingServer
          load: true
          tags: ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image tar (non-tag)
        if: "!(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))"
        run: |
          docker save ${{ env.GHCR_IMAGE }}:latest | gzip > quickdesk-signaling-image.tar.gz

      - name: Upload artifact (non-tag)
        if: "!(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))"
        uses: actions/upload-artifact@v4
        with:
          name: quickdesk-signaling-image
          path: quickdesk-signaling-image.tar.gz
          retention-days: 7
