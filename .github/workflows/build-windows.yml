name: Build Windows Binary

on:
  push:
    branches: [main, master]
    paths:
      - 'quickdesk-skill-host/skills/python-executor/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        shell: bash
        run: |
          cd quickdesk-skill-host
          cargo build -p python-executor --release
          ls -la target/release/python-executor.exe || ls -la target/release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-executor-windows-x64
          path: |
            quickdesk-skill-host/target/release/python-executor.exe
            quickdesk-skill-host/target/release/python-executor-windows-x64.zip
          retention-days: 5
